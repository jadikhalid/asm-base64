name: ASM Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install NASM
        run: sudo apt-get install -y nasm

      - name: Build with Makefile
        run: make

      - name: Run Tests
        run: make test
